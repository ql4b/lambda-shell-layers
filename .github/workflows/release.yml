name: Build and Release Layers

on:
  push:
    branches:
      - main

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all layers
        env:
          ARCH: ${{ matrix.arch }}
        run: ./scripts/build-all.sh

      - name: Rename zips with architecture suffix
        run: |
          for zip in $(find . -name "*-layer.zip"); do
            dir=$(dirname "$zip")
            base=$(basename "$zip" -layer.zip)
            mv "$zip" "$dir/${base}-${{ matrix.arch }}-layer.zip"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: layers-${{ matrix.arch }}
          path: "**/*-layer.zip"

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
