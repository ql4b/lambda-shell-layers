name: Build and Release Layers

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all layers
        env:
          ARCH: ${{ matrix.arch }}
        run: ./scripts/build-all.sh

      - name: Rename zips with architecture suffix
        run: |
          for zip in $(find . -name "*-layer.zip"); do
            dir=$(dirname "$zip")
            base=$(basename "$zip" -layer.zip)
            mv "$zip" "$dir/${base}-${{ matrix.arch }}-layer.zip"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: layers-${{ matrix.arch }}
          path: "**/*-layer.zip"

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*-layer.zip"
          generate_release_notes: true
